app:
  secret_key: "change-me-in-local-config"
  session_ttl_hours: 24
  knowledge_base_dir: "knowledge_base"

security:
  cors_allowed_domains:
    - "http://localhost:5173"

store:
  database:
    host: localhost
    port: 5433
    name: mentor_ai
    user: postgres
    password: postgres
  cache:
    host: localhost
    port: 6379

qdrant:
  host: localhost
  port: 6333

llm:
  api_key: ""
  api_base_url: ""  # e.g. https://openrouter.ai/api/v1
  model: ""          # e.g. qwen/qwen3-235b-a22b
  embedding_model: "" # e.g. qwen/qwen3-235b-a22b

rag:
  top_k: 5
  score_threshold: 0.1
  chunk_size: 512
  chunk_overlap: 64

sentry:
  dsn: ""
  env: "dev"
